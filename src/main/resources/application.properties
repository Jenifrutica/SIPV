# Nombre de la aplicacion
spring.application.name=sipv

# Conexion a MongoDB. Por defecto usa una instancia local;
# se puede sobreescribir con la variable de entorno MONGODB_URI.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/sipv}

# Puerto del servidor
server.port=8080

# Ruta de la interfaz de Swagger UI -> http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
